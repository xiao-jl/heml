<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>这是一个网页标签页标题</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .card, .info-section {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover, .info-section:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        h1 {
            color: #333333;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
            transition: color 0.3s ease;
        }

        p {
            color: #666666;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        a {
            color: #007bff;
            text-decoration: none;
            font-weight: 500;
            align-self: flex-start;
            margin-bottom: 15px;
        }

        a:hover {
            text-decoration: underline;
        }

        .img-wrapper {
            width: 100%;
            height: 160px;
            overflow: hidden;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn {
            background-color: #007bff;
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s ease;
            box-sizing: border-box;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .btn-success {
            background-color: #28a745;
        }

        .btn-success:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- 左侧区域：包含第一段代码的所有元素 -->
        <div class="info-section">
            <div>
                <h1 id="first-title">这是一个一级标题</h1>
                <p>这是一个段落。</p>
                <a href="https://example.com">这是一个超链接</a>
                <div class="img-wrapper">
                    <img src="image.jpg" alt="示例图片">
                </div>
            </div>
            <button id="myBtn" class="btn">点击修改上方标题</button>
        </div>

        <!-- 右侧区域：卡片魔术变化 -->
        <div class="card">
            <div>
                <h1 id="page-title">你好，世界！</h1>
                <p id="page-desc">这是一个合并了 HTML、CSS 和 JavaScript 的单页面网页示例。点击下方的按钮试试吧！</p>
            </div>
            <button id="action-btn" class="btn btn-success">点击触发交互</button>
        </div>

    </div>

    <script>
        // 第一段 JavaScript 交互逻辑
        const btn = document.querySelector('#myBtn');

        btn.addEventListener('click', function() {
            alert('按钮被点击了！');
            document.querySelector('#first-title').textContent = '文本已被修改';
        });

        // 第二段 JavaScript 交互逻辑
        const button = document.getElementById('action-btn');
        const title = document.getElementById('page-title');
        const description = document.getElementById('page-desc');

        button.addEventListener('click', function() {
            title.textContent = "魔术发生了！";
            title.style.color = "#28a745"; 
            
            description.textContent = "你成功触发了 JavaScript 事件监听器，网页的 DOM 结构已被动态修改。";
            
            alert('恭喜！你已成功运行了前端三大核心代码。');
        });
    </script>

</body>
</html>
